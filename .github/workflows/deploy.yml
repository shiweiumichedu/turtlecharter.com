name: CI

# Production deploys are handled by Netlify's native Git integration
# (Netlify builds and publishes on every push to main). This workflow only
# runs the test suite so pull requests and pushes stay gated on green tests.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (unit + e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: End-to-end tests
        run: npm run test:e2e
