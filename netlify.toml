# Build settings for turtlecharter.com.
# Production deploys run from Netlify's native Git integration: Netlify builds
# and publishes on every push to main using the settings below. GitHub Actions
# (.github/workflows/deploy.yml) runs the test suite in parallel as a CI gate.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Canonical host: redirect the www subdomain to the apex domain.
[[redirects]]
  from = "https://www.turtlecharter.com/*"
  to = "https://turtlecharter.com/:splat"
  status = 301
  force = true

# The classic loop route was reworked from Shangri-La to Lugu Lake (2026-07);
# keep the old URL working for anyone who bookmarked or indexed it.
[[redirects]]
  from = "/routes/kunming-dali-lijiang-shangri-la"
  to = "/routes/kunming-dali-lijiang-lugu-lake"
  status = 301

[[redirects]]
  from = "/en/routes/kunming-dali-lijiang-shangri-la"
  to = "/en/routes/kunming-dali-lijiang-lugu-lake"
  status = 301
